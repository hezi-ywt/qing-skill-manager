name: Build Installers

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
      version_tag:
        description: "Version label for artifacts (e.g. 0.3.23)"
        required: false
        default: "dev"

jobs:
  build-mac:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos' }}
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x64
            label: macos-intel
          - os: macos-latest
            arch: arm64
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        run: pnpm tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}-${{ inputs.version_tag }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-win:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app
        run: pnpm tauri build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-${{ inputs.version_tag }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ inputs.version_tag }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
